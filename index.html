<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>r4tur1@portfolio: ~</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanline"></div>
    <div class="crt-overlay"></div>
    
    <div class="window">
        <div class="titlebar">
            <div class="window-controls">
                <div class="dot dot-red"></div>
                <div class="dot dot-amber"></div>
                <div class="dot dot-green"></div>
            </div>
            <span class="titlebar-label">r4tur1@portfolio — zsh — 80×24</span>
            <div class="window-spacer"></div>
        </div>

        <div class="terminal" id="terminal">
            <!-- Boot sequence and output will be injected here -->
        </div>

        <div class="input-area">
            <div class="input-row">
                <div class="input-prompt">
                    <span class="prompt-user">r4tur1</span><span class="prompt-at">@</span><span class="prompt-host">portfolio</span><span class="prompt-path">:~</span><span class="prompt-sym">$</span>
                </div>
                <input id="cmd-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" autofocus />
            </div>
            
            <div class="hint-bar">
                <div class="hint-item"><span class="hint-key">help</span> list commands</div>
                <div class="hint-item"><span class="hint-key">whoami</span> about me</div>
                <div class="hint-item"><span class="hint-key">projects</span> my work</div>
                <div class="hint-item"><span class="hint-key">skills</span> tech stack</div>
                <div class="hint-item"><span class="hint-key">contact</span> reach me</div>
                <div class="hint-item"><span class="hint-key">clear</span> clean screen</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
